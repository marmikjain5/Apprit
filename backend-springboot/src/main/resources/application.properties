# ── Server ──────────────────────────────────────────────────────────────
server.port=8080

# ── Oracle DB (Users / Auth) ─────────────────────────────────────────────
spring.datasource.url=jdbc:oracle:thin:@localhost:1521/XEPDB1
spring.datasource.username=approval_sys
spring.datasource.password=password
spring.datasource.driver-class-name=oracle.jdbc.OracleDriver

spring.jpa.hibernate.ddl-auto=update
spring.jpa.show-sql=false
spring.jpa.properties.hibernate.dialect=org.hibernate.dialect.OracleDialect

# ── MongoDB (Documents / Approvals) ──────────────────────────────────────
spring.data.mongodb.uri=mongodb://localhost:27017/apprit_db

# ── JWT ───────────────────────────────────────────────────────────────────
app.jwt.secret=9a4f2c8d3b7a1e6f45c8a0b3f267d8b1d4e6f3c8a9d2b5f8e3a9c8b5f6v8a3d9
app.jwt.expirationMs=86400000

# ── Pinata IPFS ───────────────────────────────────────────────────────────
pinata.api.key=${PINATA_API_KEY}
pinata.api.secret=${PINATA_API_SECRET}
pinata.jwt=${PINATA_JWT}
pinata.gateway=https://gateway.pinata.cloud/ipfs/

# ── File Upload ───────────────────────────────────────────────────────────
spring.servlet.multipart.max-file-size=10MB
spring.servlet.multipart.max-request-size=10MB

# ── Logging ───────────────────────────────────────────────────────────────
logging.level.com.marmik.apprit=DEBUG
