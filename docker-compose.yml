version: '3.8'
services:
  oracle-db:
    image: gvenzl/oracle-xe:21-slim
    container_name: oracle-db
    environment:
      - ORACLE_PASSWORD=password
      - APP_USER=c##approval_sys
      - APP_USER_PASSWORD=password
    ports:
      - "1521:1521"
    volumes:
      - oracle-data:/opt/oracle/oradata

  mongodb:
    image: mongo:6.0
    container_name: mongodb
    ports:
      - "27017:27017"
    volumes:
      - mongo-data:/data/db

volumes:
  oracle-data:
  mongo-data:
